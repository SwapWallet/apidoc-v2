        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /v1/merchants/transactions/{transactionId}:
    get:
      tags:
        - تراکنش‌ها
      summary: دریافت تراکنش با شناسه
      description: |
        اطلاعات کامل یک تراکنش را بر اساس شناسه‌ی عددی آن برمی‌گرداند.

        بسته به مقدار فیلد `type`، فقط یکی از آبجکت‌های جزئیات
        (`internalPaymentTransactionDto`، `externalPaymentTransactionDto`، `settlementTransactionDto`)
        مقدار خواهد داشت و بقیه `null` هستند.
      operationId: getTransactionById
      parameters:
        - name: transactionId
          in: path
          required: true
          description: شناسه‌ی عددی تراکنش
          schema:
            type: integer
            format: int64
