openapi: 3.1.0

info:
  version: 1.0.0
  title: مستندات API سواپ‌ولت برای پنل مدیریت فروشگاه‌ها
  description: |
    این مستند برای آشنایی شما با API [سواپ‌ولت](https://business.swapwallet.app) تهیه شده است تا بتوانید بیشترین بهره را از حساب کاربری خود ببرید.

    با استفاده از API سواپ‌ولت، می‌توانید کارهایی مانند موارد زیر را انجام دهید:
    - مدیریت فروشگاه و تراکنش‌ها
    - مشاهده وضعیت تراکنش‌ها
    - ساخت رسید

    پیش از استفاده از APIها، لطفاً [قوانین استفاده از سواپ‌ولت](https://swapwallet.app/tos) را مطالعه کرده و بپذیرید. همچنین برای دریافت اطلاعیه‌های رسمی و تغییرات نسخه‌ها، در [گروه اطلاع‌رسانی سواپ‌ولت](https://t.me/SwapWalletGroup) عضو شوید.

    ---

    ## دریافت کلید فروشگاه

    برای استفاده از API فروشگاه لازم است یک **کلید API** برای فروشگاه خود ایجاد کنید.

    مراحل دریافت:
    1. ورود به [پنل مدیریت فروشگاه](https://business.swapwallet.app)
    2. ایجاد یک کسب‌وکار جدید
    3. ورود به فروشگاه مورد نظر
    4. دریافت کلید از بخش **تنظیمات** ← کلید دسترسی (API Key)

    سپس کلید خود را در هدر درخواست‌ها به‌صورت زیر ارسال کنید:

    ```http
    Authorization: Bearer business-xxx
    ```
    
    > [!note]
    > تمام مبالغ دریافتی مستقیماً به کیف پول شخصی صاحب فروشگاه تسویه می‌شوند. برای ورود به پنل می‌توانید از شماره موبایل یا حساب تلگرام خود استفاده کنید.

    > [!note]
    > هر فروشگاه کلید اختصاصی خود را دارد و برای فروشگاه‌های دیگر باید همین روند را برای فروشگاه مدنظر طی کنید.

    > [!note]
    > کلیدهای API برای استفاده‌ی برنامه‌نویسی بهینه‌سازی شده‌اند؛ هنگام استفاده از این کلیدها، محدودیت‌های دومرحله‌ای نظیر ایمیل، پیامک و Google Authenticator اعمال نمی‌شوند.

    ---

    ## نکات امنیتی

    > [!caution]
    > توکن خود را تحت هیچ شرایطی با دیگران به اشتراک نگذارید.
    > در صورت لو رفتن یا شک به دسترسی غیرمجاز، فوراً از طریق پنل فروشگاه مورد نظر، توکن خود را منقضی کرده و توکن جدید دریافت کنید.

    در صورت نیاز به استفاده از توکن در کد، مطمئن شوید که با روش‌های امن نگهداری داده‌های حساس آشنا هستید.

    ✨ با رعایت این نکات، می‌توانید به‌صورت ایمن و مؤثر از API سواپ‌ولت در پروژه‌های خود استفاده کنید.

servers:
  - url: https://swapwallet.app/api
    description: سرور پروداکشن

tags:
  - name: اطلاعات فروشگاه
    description: |
      اطلاعات کلی فروشگاه و اعضای آن را مشاهده کنید.

  - name: موجودی
    description: |
      موجودی لحظه‌ای حساب خود را به تفکیک هر توکن مشاهده کنید.

  - name: برداشت ریالی
    description: |
      عملیات تسویه و برداشت ریالی فروشگاه را انجام دهید.

  - name: آمار فروش
    description: |
      آمار فروش و درآمد فروشگاه را در بازه‌های زمانی مختلف مشاهده کنید.

  - name: تراکنش‌ها
    description: |
      با استفاده از این APIها می‌توانید اطلاعات تراکنش‌های حساب فروشگاه خود را دریافت کنید.

      هر تراکنش دارای یک فیلد `type` است که نوع آن را مشخص می‌کند. بسته به نوع تراکنش، یکی از آبجکت‌های جزئیات اختصاصی در پاسخ موجود خواهد بود:

      | نوع (`type`) | شرح | آبجکت جزئیات |
      |---|---|---|
      | `INTERNAL_PAYMENT` | پرداخت داخلی | `internalPaymentTransactionDto` |
      | `EXTERNAL_PAYMENT` | پرداخت خارجی | `externalPaymentTransactionDto` |
      | `SETTLEMENT` | تسویه | `settlementTransactionDto` |

  - name: فاکتور
    description: |
      با استفاده از این APIها می‌توانید فاکتورهای پرداخت کریپتویی برای فروشگاه خود ایجاد و مدیریت کنید.

      کاربر پس از دریافت لینک پرداخت، مبلغ را مستقیماً به کیف پول اختصاص‌یافته واریز می‌کند. پس از تأیید تراکنش روی شبکه، وب‌هوک شما فراخوانی می‌شود.

  - name: فاکتور ریالی
    description: |
      دریافت پرداخت ریالی با مبلغ ثابت به تومان.

  - name: وب‌هوک
    description: |
      مدیریت و پیگیری وضعیت وب‌هوک‌های فاکتور.

x-tagGroups:
  - name: عمومی
    tags:
      - اطلاعات فروشگاه
  - name: درگاه پرداخت
    tags:
      - فاکتور
  - name: کیف پول
    tags:
      - موجودی
      - تراکنش‌ها
      - برداشت ریالی
  - name: دیگر
    tags:
      - فاکتور ریالی
      - وب‌هوک

paths:
  /v1/merchants/info:
    get:
      tags:
        - اطلاعات فروشگاه
      summary: اطلاعات فروشگاه
      description: |
        با استفاده از این API می‌توانید اطلاعات کلی فروشگاه خود را مشاهده نمایید.
      operationId: getApplicationInformation
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: اطلاعات فروشگاه با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                success:
                  summary: نمونه پاسخ
                  value:
                    status: OK
                    result:
                      id: 101
                      type: API
                      ownerId: 12
                      supportCode: "APP-8LEYRQH-G8HM"
                      status: ACTIVE
                      username: "my-shop"
                      logo: "https://swapwallet.app/media/logo.png"
                      name: "My Shop"
                      description: "فروشگاه نمونه"
                      website: "https://example.com"
                      webhookUrl: "https://example.com/webhook"
                      deepLinks:
                        - SWAP_WALLET
                        - TRUST_WALLET
                        - METAMASK
                      feePayer: APPLICATION
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /v1/merchants/balance:
    get:
      tags:
        - موجودی
      summary: موجودی همه‌ی توکن‌ها
      description: |
        لیست موجودی حساب به تفکیک تمام توکن‌های پشتیبانی‌شده را برمی‌گرداند.
      operationId: getAllBalances
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: موجودی‌ها با موفقیت دریافت شدند
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalBalanceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /v1/merchants/transactions:
    get:
      tags:
        - تراکنش‌ها
      summary: دریافت لیست تراکنش‌ها
      description: |
        لیست تراکنش‌های فروشگاه را برمی‌گرداند.

        این endpoint از **pagination**، **sorting** و **filtering** پشتیبانی می‌کند.

        برای هر تراکنش، بسته به مقدار فیلد `type`، فقط یکی از آبجکت‌های زیر مقدار خواهد داشت:

        - `internalPaymentTransactionDto`
        - `externalPaymentTransactionDto`
        - `settlementTransactionDto`
      operationId: getTransactions
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/TransactionsSortedByParam'
        - $ref: '#/components/parameters/DirectionParam'
        - name: supportCode
          in: query
          required: false
          description: فیلتر بر اساس کد پشتیبانی تراکنش
          schema:
            type: string
            example: TX-9F3K2M1
        - name: transactionTypes
          in: query
          required: false
          description: |
            فیلتر بر اساس نوع تراکنش.

            می‌توان چند مقدار ارسال کرد.

            مثال:
            `transactionTypes=INTERNAL_PAYMENT&transactionTypes=SETTLEMENT`
