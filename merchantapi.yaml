webhooks:
  invoice-paid:
    post:
      tags:
        - فاکتور
      summary: وب‌هوک پرداخت فاکتور
      description: |
        پس از پرداخت موفق فاکتور، سواپ‌ولت یک درخواست `POST` به آدرس `webhookUrl` شما ارسال می‌کند.

        برای اطمینان از صحت درخواست، فیلد `hmac` را با کلید API خود بررسی کنید.

        > [!note]
        > درخواست‌های وب‌هوک هم از سرورهای داخل ایران و هم از سرورهای خارج از ایران ارسال می‌شوند تا از دریافت موفق آن‌ها اطمینان حاصل شود. لطفاً مطمئن شوید سرویس شما هر دو را می‌پذیرد.

        > [!note]
        > در صورتی که وب‌هوک پاسخ موفق `200` دریافت نکند، سواپ‌ولت در بازه‌های زمانی مختلف درخواست را تکرار می‌کند تا از دریافت آپدیت توسط سرویس شما اطمینان حاصل شود. تاریخچه‌ی کامل درخواست‌های وب‌هوک را می‌توانید از پنل فروشندگان مشاهده کنید.

        > [!note]
        > سرویس شما باید به صورت **idempotent** طراحی شده باشد. سواپ‌ولت تضمینی برای ارسال تنها یک‌بار وب‌هوک نمی‌دهد و ممکن است یک رویداد چندین بار ارسال شود.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              invoice-paid:
                summary: پرداخت موفق فاکتور
                value:
                  requestId: "560fc0fe-773f-46e4-8446-259ed7a9f6d0"
                  hmac: "3664744a8cc0afb4359e7c8b20cf953b5047bbfe24604d7af4c151e54881c229"
                  event:
