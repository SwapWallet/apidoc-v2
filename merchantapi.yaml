components:
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
        example: Bearer business-yourTokenHere
      description: هدر احراز هویت پنل فروشگاه

    PageParam:
      name: page
      in: query
      required: false
      description: شماره صفحه (از صفر شروع می‌شود)
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 0

    LimitParam:
      name: limit
      in: query
      required: false
      description: تعداد آیتم‌های هر صفحه
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
        example: 10

    DirectionParam:
      name: direction
      in: query
      required: false
      description: جهت مرتب‌سازی
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
        example: DESC

    TransactionsSortedByParam:
      name: sortedBy
      in: query
      required: false
      description: فیلد مرتب‌سازی در لیست تراکنش‌ها
      schema:
        type: string
        default: id
        example: timestamp

    InvoicesSortedByParam:
      name: sortedBy
      in: query
      required: false
      description: فیلد مرتب‌سازی در لیست فاکتورها
      schema:
        type: string
        default: createdAt
        example: createdAt

  responses:
    UnauthorizedResponse:
      description: عدم احراز هویت

  schemas:
