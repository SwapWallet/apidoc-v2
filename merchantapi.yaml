paths:
  /v1/merchants/balance:
    get:
      tags:
        - موجودی
      summary: موجودی همه‌ی توکن‌ها
      description: لیست موجودی حساب به تفکیک تمام توکن‌های پشتیبانی‌شده را برمی‌گرداند.
      operationId: getAllBalances
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: موجودی‌ها با موفقیت دریافت شدند
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalBalanceDTO'
              example:
                status: "OK"
                result:
                  totalValue:
                    available:
                      - number: "100.50"
                        unit: "USDT"
                      - number: "200000"
                        unit: "IRT"
                    onHold:
                      - number: "0"
                        unit: "USDT"
                      - number: "0"
                        unit: "IRT"
                  tokens:
                    - name: "USDT"
                      available:
                        amount:
                          number: "100.50"
                          unit: "USDT"
                        values:
                          - number: "100.50"
                            unit: "USDT"
                          - number: "20100000"
                            unit: "IRT"
                      onHold:
                        amount:
                          number: "0"
                          unit: "USDT"
                        values:
                          - number: "0"
                            unit: "USDT"
                          - number: "0"
                            unit: "IRT"
                      marketData:
                        - source: "USDT"
                          destination: "USDT"
                          marketData:
                            bestSell: "1.00"
                            bestBuy: "1.00"
                            latestPrice: "1.00"
                            dayChange: "0.00"
                            volume24h: "0.00"
                        - source: "USDT"
                          destination: "IRT"
                          marketData:
                            bestSell: "200000"
                            bestBuy: "200000"
                            latestPrice: "200000"
                            dayChange: "0.00"
                            volume24h: "0.00"
                    - name: "IRT"
                      available:
                        amount:
                          number: "200000"
                          unit: "IRT"
                        values:
                          - number: "1.00"
                            unit: "USDT"
                          - number: "200000"
                            unit: "IRT"
                      onHold:
                        amount:
                          number: "0"
                          unit: "IRT"
                        values:
                          - number: "0"
                            unit: "USDT"
                          - number: "0"
                            unit: "IRT"
                      marketData:
                        - source: "IRT"
                          destination: "USDT"
                          marketData:
                            bestSell: "0.000005"
                            bestBuy: "0.000005"
                            latestPrice: "0.000005"
                            dayChange: "0.00"
                            volume24h: "0.00"
                        - source: "IRT"
                          destination: "IRT"
                          marketData:
                            bestSell: "1"
                            bestBuy: "1"
                            latestPrice: "1"
                            dayChange: "0"
                            volume24h: "0"
        '401':
          description: عدم احراز هویت

  /v1/merchants/balance/{token}:
    get:
      tags:
        - موجودی
      summary: موجودی یک توکن
      description: موجودی حساب برای یک توکن مشخص را برمی‌گرداند.
      operationId: getTokenBalance
      parameters:
        - name: token
          in: path
          required: true
          description: نماد توکن (مثلاً USDT، TON)
          schema:
            $ref: '#/components/schemas/TokenEnum'
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: موجودی با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenBalanceDto'
              example:
                status: "OK"
                result:
                  name: "USDT"
                  available:
                    amount:
                      number: "100.50"
                      unit: "USDT"
                    values:
                      - number: "100.50"
                        unit: "USDT"
                      - number: "20100000"
                        unit: "IRT"
                  onHold:
                    amount:
                      number: "0"
                      unit: "USDT"
                    values:
                      - number: "0"
                        unit: "USDT"
                      - number: "0"
                        unit: "IRT"
                  marketData:
                    - source: "USDT"
                      destination: "USDT"
                      marketData:
                        bestSell: "1.00"
                        bestBuy: "1.00"
                        latestPrice: "1.00"
                        dayChange: "0.00"
                        volume24h: "0.00"

                    - source: "USDT"
                      destination: "IRT"
                      marketData:
                        bestSell: "200000"
                        bestBuy: "200000"
                        latestPrice: "200000"
                        dayChange: "0.00"
                        volume24h: "0.00"
        '401':
          description: عدم احراز هویت
        '404':
          description: توکن یافت نشد

  /v1/merchants/transactions/{transactionId}:
    get:
      tags:
        - تراکنش‌ها
      summary: دریافت تراکنش با شناسه
      description: |
        اطلاعات کامل یک تراکنش را بر اساس شناسه‌ی عددی آن برمی‌گرداند.

        بسته به مقدار فیلد `type`، یکی از آبجکت‌های جزئیات (`transfer`، `trade`، `fiatWithdraw` و ...) در پاسخ وجود خواهد داشت و بقیه `null` هستند.
      operationId: getTransactionById
      parameters:
        - name: transactionId
          in: path
          required: true
          description: شناسه‌ی عددی تراکنش
          schema:
            type: integer
            format: int64
            example: 170776
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: تراکنش با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantTransactionDto'
        '401':
          description: عدم احراز هویت
        '404':
          description: تراکنش یافت نشد

components:
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
        example: Bearer business-fLzqwAAvChZUtMcpNc77gRnDZg52daMmVxns5VXyVLbCT2OI1lSHdMNrF49vv50p
      description: >
        هدر احراز هویت پنل فروشگاه

  schemas:
    ResponseStatusEnum:
      type: string
      enum:
        - OK
        - ERROR

    TokenEnum:
      type: string
      enum:
        - USDT
        - TON
        - TRX
        - IRT
        - ETH
        - BNB

    Money:
      type: object
      properties:
        number:
          type: string
        unit:
          type: string
          description: واحد ارزی (مثلاً USDT، IRT، USD)
      required:
        - number
        - unit
      example:
        number: "100.50"
        unit: "USDT"

    TokenBalanceDto:
      type: object
      properties:
        token:
          $ref: '#/components/schemas/TokenEnum'
        amount:
          $ref: '#/components/schemas/Money'
      example:
        token: "USDT"
        amount:
          number: "999800"
          unit: "USDT"

    TotalValueDto:
      type: object
      properties:
        available:
          type: array
          items:
            $ref: '#/components/schemas/Money'
        onHold:
          type: array
          items:
            $ref: '#/components/schemas/Money'

    TokenAmountAndValueDto:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Money'
        values:
          type: array
          items:
            $ref: '#/components/schemas/Money'

    MarketDataDTO:
      type: object
      properties:
        bestSell:
          type: String
        bestBuy:
          type: String
        latestPrice:
          type: String
        dayChange:
          type: String
        volume24h:
          type: String

    ExternalMarketDataDTO:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/TokenEnum'
        destination:
          $ref: '#/components/schemas/TokenEnum'
        marketData:
          $ref: '#/components/schemas/MarketDataDTO'

    TokensBalanceDto:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/TokenEnum'
        available:
          $ref: '#/components/schemas/TokenAmountAndValueDto'
        onHold:
          $ref: '#/components/schemas/TokenAmountAndValueDto'
        marketData:
          type: array
          items:
            $ref: '#/components/schemas/ExternalMarketDataDTO'

    TotalBalanceDTO:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          type: object
          properties:
            totalValue:
              $ref: '#/components/schemas/TotalValueDto'
            tokens:
              type: array
              items:
                $ref: '#/components/schemas/TokensBalanceDto'
      example:
        status: "OK"
        result:
          totalValue:
            available:
              - number: "100.50"
                unit: "USDT"
              - number: "200000"
                unit: "IRT"
            onHold:
              - number: "0"
                unit: "USDT"
              - number: "0"
                unit: "IRT"
          tokens:
