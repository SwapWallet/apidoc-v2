                      settlementTransactionDto:
                        type: OWNER
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          description: تراکنش یافت نشد

  /v1/merchants/invoices:
    get:
      tags:
        - فاکتور
      summary: دریافت لیست فاکتورهای فروشگاه
      description: |
        لیست فاکتورهای ایجاد شده برای فروشگاه را برمی‌گرداند.

        این endpoint از **pagination**، **sorting** و **filtering** پشتیبانی می‌کند.

        می‌توانید نتایج را بر اساس:
        - نوع فاکتور (`invoiceTypes`)
        - وضعیت فاکتور (`invoiceStatuses`)
        - جستجو (`search`)
        فیلتر کنید.
      operationId: getRecentApplicationInvoices
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/InvoicesSortedByParam'
        - $ref: '#/components/parameters/DirectionParam'
        - name: search
          in: query
          required: false
          description: جستجو در فیلدهای فاکتور مانند `supportCode` یا `orderId`
          schema:
            type: string
            example: AI-8LEYRQH-G8HM
        - name: invoiceTypes
          in: query
          required: false
          description: |
            فیلتر بر اساس نوع فاکتور.

            مثال:
            `invoiceTypes=INTERNAL_CRYPTO&invoiceTypes=EXTERNAL_BLOCKCHAIN`
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/MerchantApplicationInvoiceTypeEnum'
          example:
            - INTERNAL_CRYPTO
            - EXTERNAL_BLOCKCHAIN
        - name: invoiceStatuses
          in: query
          required: false
          description: |
            فیلتر بر اساس وضعیت فاکتور.

            مثال:
            `invoiceStatuses=ACTIVE&invoiceStatuses=PAID`
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ApplicationInvoiceStatusEnum'
          example:
            - ACTIVE
            - PAID
      responses:
        '200':
          description: لیست فاکتورها با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantInvoicesListResponse'
              examples:
                invoicesExample:
                  summary: نمونه پاسخ
                  value:
                    status: OK
                    result:
                      page: 0
                      perPage: 10
                      totalItems: 2
                      totalPages: 1
                      data:
                        - type: INTERNAL_CRYPTO
                          amount:
                            number: "100.50"
                            unit: "USDT"
                          supportCode: "AI-8LEYRQH-G8HM"
                          orderId: "ORDER-1001"
                          description: "پرداخت اشتراک"
                          createdAt: "2026-03-15T12:10:00Z"
                          status: PAID
                          extraStatus: null
                        - type: EXTERNAL_BLOCKCHAIN
                          amount:
                            number: "500000"
                            unit: "IRT"
                          supportCode: "AI-2ZMN4TR-K1PL"
                          orderId: "ORDER-1002"
                          description: "پرداخت از طریق شبکه"
                          createdAt: "2026-03-16T10:05:00Z"
                          status: ACTIVE
                          extraStatus: null
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

components:
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
        example: Bearer business-fLzqwAAvChZUtMcpNc77gRnDZg52daMmVxns5VXyVLbCT2OI1lSHdMNrF49vv50p
      description: هدر احراز هویت پنل فروشگاه

    PageParam:
      name: page
      in: query
      required: false
      description: شماره صفحه (از صفر شروع می‌شود)
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 0

    LimitParam:
      name: limit
      in: query
      required: false
      description: تعداد آیتم‌های هر صفحه
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
        example: 10

    DirectionParam:
      name: direction
      in: query
      required: false
      description: جهت مرتب‌سازی
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
        example: DESC

    TransactionsSortedByParam:
      name: sortedBy
      in: query
      required: false
      description: فیلد مرتب‌سازی در لیست تراکنش‌ها
      schema:
        type: string
        default: id
        example: timestamp

    InvoicesSortedByParam:
      name: sortedBy
      in: query
      required: false
      description: فیلد مرتب‌سازی در لیست فاکتورها
      schema:
        type: string
        default: createdAt
        example: createdAt

  responses:
    UnauthorizedResponse:
      description: عدم احراز هویت

  schemas:
    ResponseStatusEnum:
      type: string
      enum:
        - OK
        - ERROR

    TokenEnum:
      type: string
      enum:
        - USDT
        - TON
        - TRX
        - IRT
        - ETH
        - BNB

    Money:
      type: object
      required:
        - number
        - unit
      properties:
        number:
          type: string
        unit:
          type: string
          description: واحد ارزی (مثلاً USDT، IRT، USD)
      example:
        number: "100.50"
        unit: "USDT"

    TotalValueDto:
      type: object
      properties:
        available:
          type: array
          items:
            $ref: '#/components/schemas/Money'
        onHold:
          type: array
          items:
            $ref: '#/components/schemas/Money'

    TokenAmountAndValueDto:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Money'
        values:
          type: array
          items:
            $ref: '#/components/schemas/Money'

    MarketDataDTO:
      type: object
      properties:
        bestSell:
          type: string
        bestBuy:
          type: string
        latestPrice:
          type: string
        dayChange:
          type: string
        volume24h:
          type: string

    ExternalMarketDataDTO:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/TokenEnum'
        destination:
          $ref: '#/components/schemas/TokenEnum'
        marketData:
          $ref: '#/components/schemas/MarketDataDTO'

    TokensBalanceDto:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/TokenEnum'
        available:
          $ref: '#/components/schemas/TokenAmountAndValueDto'
        onHold:
          $ref: '#/components/schemas/TokenAmountAndValueDto'
        marketData:
          type: array
          items:
            $ref: '#/components/schemas/ExternalMarketDataDTO'
      example:
        name: USDT
        available:
          amount:
            number: "100.50"
            unit: "USDT"
          values:
            - number: "100.50"
              unit: "USDT"
            - number: "20100000"
              unit: "IRT"
        onHold:
          amount:
            number: "0"
            unit: "USDT"
          values:
            - number: "0"
              unit: "USDT"
            - number: "0"
              unit: "IRT"
        marketData:
          - source: USDT
            destination: USDT
            marketData:
              bestSell: "1.00"
              bestBuy: "1.00"
              latestPrice: "1.00"
              dayChange: "0.00"
              volume24h: "0.00"
          - source: USDT
            destination: IRT
            marketData:
              bestSell: "200000"
              bestBuy: "200000"
              latestPrice: "200000"
              dayChange: "0.00"
              volume24h: "0.00"

    TotalBalanceDTO:
      type: object
      properties:
        totalValue:
          $ref: '#/components/schemas/TotalValueDto'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/TokensBalanceDto'
      example:
        totalValue:
          available:
            - number: "100.50"
              unit: "USDT"
            - number: "200000"
              unit: "IRT"
          onHold:
            - number: "0"
              unit: "USDT"
            - number: "0"
              unit: "IRT"
        tokens:
          - name: USDT
            available:
              amount:
                number: "100.50"
                unit: "USDT"
              values:
                - number: "100.50"
                  unit: "USDT"
                - number: "20100000"
                  unit: "IRT"
            onHold:
              amount:
                number: "0"
                unit: "USDT"
              values:
                - number: "0"
                  unit: "USDT"
                - number: "0"
                  unit: "IRT"
            marketData:
              - source: USDT
                destination: USDT
                marketData:
                  bestSell: "1.00"
                  bestBuy: "1.00"
                  latestPrice: "1.00"
                  dayChange: "0.00"
                  volume24h: "0.00"
              - source: USDT
                destination: IRT
                marketData:
                  bestSell: "200000"
                  bestBuy: "200000"
                  latestPrice: "200000"
                  dayChange: "0.00"
                  volume24h: "0.00"
          - name: IRT
            available:
              amount:
                number: "200000"
                unit: "IRT"
              values:
                - number: "1.00"
                  unit: "USDT"
                - number: "200000"
                  unit: "IRT"
            onHold:
              amount:
                number: "0"
                unit: "IRT"
              values:
                - number: "0"
                  unit: "USDT"
                - number: "0"
                  unit: "IRT"
            marketData:
              - source: IRT
                destination: USDT
                marketData:
                  bestSell: "0.000005"
                  bestBuy: "0.000005"
                  latestPrice: "0.000005"
                  dayChange: "0.00"
                  volume24h: "0.00"
              - source: IRT
                destination: IRT
                marketData:
                  bestSell: "1"
                  bestBuy: "1"
                  latestPrice: "1"
                  dayChange: "0"
                  volume24h: "0"

    MerchantTransactionTypeEnum:
      type: string
      enum:
        - INTERNAL_PAYMENT
        - EXTERNAL_PAYMENT
        - SETTLEMENT

    AmountAndIrtAndUsdValues:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Money'
        usdValue:
          $ref: '#/components/schemas/Money'
        irtValue:
          $ref: '#/components/schemas/Money'

    MerchantApplicationInvoiceTypeEnum:
      type: string
      enum:
        - EXTERNAL_BLOCKCHAIN
        - INTERNAL_FIAT
        - INTERNAL_CRYPTO

    ApplicationInvoiceStatusEnum:
      type: string
      enum:
        - ACTIVE
        - PAID
        - EXPIRED
        - CANCELED

    MerchantApplicationInvoiceExtraStatusEnum:
      type: string
      enum:
        - OVER_PAID
        - UNDER_PAID

    MerchantApplicationInvoiceDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/MerchantApplicationInvoiceTypeEnum'
        amount:
          $ref: '#/components/schemas/Money'
        supportCode:
          type: string
          description: کد پشتیبانی
        orderId:
          anyOf:
            - type: string
            - type: 'null'
        description:
          anyOf:
            - type: string
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ApplicationInvoiceStatusEnum'
        extraStatus:
          anyOf:
            - $ref: '#/components/schemas/MerchantApplicationInvoiceExtraStatusEnum'
            - type: 'null'
      example:
        type: INTERNAL_CRYPTO
        amount:
          number: "100.50"
          unit: "USDT"
        supportCode: "AI-8LEYRQH-G8HM"
        orderId: null
        description: null
        createdAt: "2026-02-24T15:12:01.008878Z"
        status: PAID
        extraStatus: null

    MerchantInternalPaymentTransactionDetailsDto:
      type: object
      properties:
        applicationInvoice:
          $ref: '#/components/schemas/MerchantApplicationInvoiceDto'
        amount:
          $ref: '#/components/schemas/AmountAndIrtAndUsdValues'

    MerchantExternalPaymentTransactionDetailsDto:
      type: object
      properties:
        applicationInvoice:
          $ref: '#/components/schemas/MerchantApplicationInvoiceDto'

    MerchantSettlementTransactionDetailsDto:
      type: object
      properties:
        type:
          type: string

    MerchantTransactionDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: شناسه‌ی عددی تراکنش
        type:
          $ref: '#/components/schemas/MerchantTransactionTypeEnum'
        amount:
          $ref: '#/components/schemas/AmountAndIrtAndUsdValues'
        fee:
          $ref: '#/components/schemas/Money'
        feeValue:
          $ref: '#/components/schemas/Money'
        timestamp:
          type: string
          format: date-time
          description: زمان ثبت تراکنش به فرمت ISO 8601
        supportCode:
          type: string
          description: کد پشتیبانی
        internalPaymentTransactionDto:
          anyOf:
            - $ref: '#/components/schemas/MerchantInternalPaymentTransactionDetailsDto'
            - type: 'null'
        externalPaymentTransactionDto:
          anyOf:
            - $ref: '#/components/schemas/MerchantExternalPaymentTransactionDetailsDto'
            - type: 'null'
        settlementTransactionDto:
          anyOf:
            - $ref: '#/components/schemas/MerchantSettlementTransactionDetailsDto'
            - type: 'null'
      example:
        id: 1
        type: INTERNAL_PAYMENT
        amount:
          amount:
            number: "100.50"
            unit: "USDT"
          usdValue:
            number: "100.50"
            unit: "USD"
          irtValue:
            number: "20100000"
            unit: "IRT"
        fee:
          number: "0.1005"
          unit: "USDT"
        feeValue:
          number: "0.1005"
          unit: "USD"
        timestamp: "2026-03-16T23:17:56.349Z"
        supportCode: "AI-8LEYRQH-G8HM"
        internalPaymentTransactionDto:
          applicationInvoice:
            type: INTERNAL_CRYPTO
            amount:
              number: "100.50"
              unit: "USDT"
            supportCode: "AI-8LEYRQH-G8HM"
            orderId: null
            description: null
            createdAt: "2026-02-24T15:12:01.008878Z"
            status: PAID
            extraStatus: null
          amount:
            amount:
              number: "100.50"
              unit: "USDT"
            usdValue:
              number: "100.50"
              unit: "USD"
            irtValue:
              number: "20100000"
              unit: "IRT"
        externalPaymentTransactionDto: null
        settlementTransactionDto: null

    MerchantTransactionsResponse:
      type: object
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalItems:
          type: integer
          format: int64
        totalPages:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/MerchantTransactionDto'

    MerchantInvoicesPagination:
      type: object
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalItems:
          type: integer
          format: int64
        totalPages:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/MerchantApplicationInvoiceDto'

    ApplicationStatusEnum:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - DELETED
      example: ACTIVE

    ApplicationInformationDto:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ApplicationStatusEnum'
        username:
          type: string
        name:
          type: string
        description:
          anyOf:
            - type: string
            - type: 'null'
        logo:
          anyOf:
            - type: string
            - type: 'null'
        website:
          anyOf:
            - type: string
            - type: 'null'
        verified:
          type: boolean
      example:
        status: ACTIVE
        username: Foo
        name: Foo
        description: Foo
        logo: https://swapwallet.app/favicon.ico
        website: https://business.swapwallet.app
        verified: true

    ApplicationInformationResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          $ref: '#/components/schemas/ApplicationInformationDto'

    TotalBalanceResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          $ref: '#/components/schemas/TotalBalanceDTO'

    TokenBalanceResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          $ref: '#/components/schemas/TokensBalanceDto'

    MerchantTransactionsListResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          $ref: '#/components/schemas/MerchantTransactionsResponse'
