        status: OK
        result:
          page: 1
          perPage: 20
          totalItems: 2
          totalPages: 1
          data:
            - id: 170776
              type: INTERNAL_PAYMENT
              amount:
                amount:
                  number: "250.00"
                  unit: "USDT"
                usdValue:
