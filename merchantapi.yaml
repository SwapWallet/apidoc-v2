  /v1/merchants/invoices/full-data:
    get:
      tags:
        - فاکتور
      summary: دریافت لیست کامل فاکتورها
      description: |
        لیست کامل فاکتورهای فروشگاه را به همراه اطلاعات کامل‌تر هر فاکتور برمی‌گرداند.

        این endpoint از **pagination**، **sorting** و **filtering** پشتیبانی می‌کند.

        می‌توانید نتایج را بر اساس:
        - نوع فاکتور (`invoiceTypes`)
        - وضعیت فاکتور (`invoiceStatuses`)
        - جستجو (`search`)
        فیلتر کنید.
      operationId: getApplicationInvoices
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/InvoicesSortedByParam'
        - $ref: '#/components/parameters/DirectionParam'

        - name: search
          in: query
          required: false
          description: جستجو در فیلدهای فاکتور مانند `supportCode` یا `orderId`
          schema:
            type: string
            example: AI-8LEYRQH-G8HM

        - name: invoiceTypes
          in: query
          required: false
          description: |
            فیلتر بر اساس نوع فاکتور.

            مثال:
            `invoiceTypes=CRYPTO_INVOICE&invoiceTypes=TEMP_WALLET`
