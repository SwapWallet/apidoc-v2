              amount:
                amount:
                  number: "5000000"
                  unit: "IRT"
                usdValue:
                  number: "79.37"
                  unit: "USD"
                irtValue:
                  number: "5000000"
                  unit: "IRT"
              fee:
                number: "0"
                unit: "IRT"
              feeValue:
                number: "0"
                unit: "USD"
              timestamp: "2026-03-16T14:20:33Z"
              supportCode: "TX-7H5D9N2"
              internalPaymentTransactionDto: null
              externalPaymentTransactionDto: null
              settlementTransactionDto:
                type: OWNER

    MerchantTransactionResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatusEnum'
        result:
          $ref: '#/components/schemas/MerchantTransactionDto'
      example:
        status: OK
        result:
          id: 170776
          type: INTERNAL_PAYMENT
          amount:
            amount:
              number: "250.00"
              unit: "USDT"
            usdValue:
              number: "250.00"
              unit: "USD"
            irtValue:
              number: "15750000"
              unit: "IRT"
          fee:
            number: "2.50"
            unit: "USDT"
          feeValue:
            number: "2.50"
            unit: "USD"
          timestamp: "2026-03-16T09:45:12Z"
