paths:
  /v1/merchants/info:
    get:
      tags:
        - اطلاعات فروشگاه
      summary: اطلاعات فروشگاه
      description: |
        با استفاده از این API می‌توانید اطلاعات کلی فروشگاه خود را مشاهده نمایید.
      operationId: getInfo
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: اطلاعات فروشگاه با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationInformationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /v1/merchants/balance:
    get:
      tags:
        - موجودی
      summary: موجودی همه‌ی توکن‌ها
      description: |
        لیست موجودی حساب به تفکیک تمام توکن‌های پشتیبانی‌شده را برمی‌گرداند.
      operationId: getAllBalances
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: موجودی‌ها با موفقیت دریافت شدند
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalBalanceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /v1/merchants/balance/{token}:
    get:
      tags:
        - موجودی
      summary: موجودی یک توکن
      description: |
        موجودی حساب برای یک توکن مشخص را برمی‌گرداند.
      operationId: getTokenBalance
      parameters:
        - name: token
          in: path
          required: true
          description: نماد توکن (مثلاً USDT، TON)
          schema:
            $ref: '#/components/schemas/TokenEnum'
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: موجودی با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenBalanceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          description: توکن یافت نشد

  /v1/merchants/transactions:
    get:
      tags:
        - تراکنش‌ها
      summary: دریافت لیست تراکنش‌ها
      description: |
        لیست تراکنش‌های فروشگاه را برمی‌گرداند.

        این endpoint از **pagination**، **sorting** و **filtering** پشتیبانی می‌کند.

        برای هر تراکنش، بسته به مقدار فیلد `type`، فقط یکی از آبجکت‌های زیر مقدار خواهد داشت:

        - `internalPaymentTransactionDto`
        - `externalPaymentTransactionDto`
        - `settlementTransactionDto`
      operationId: getTransactions
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/TransactionsSortedByParam'
        - $ref: '#/components/parameters/DirectionParam'
        - name: supportCode
          in: query
          required: false
          description: فیلتر بر اساس کد پشتیبانی تراکنش
          schema:
            type: string
            example: TX-9F3K2M1
        - name: transactionTypes
          in: query
          required: false
          description: |
            فیلتر بر اساس نوع تراکنش.

            می‌توان چند مقدار ارسال کرد.

            مثال:
            `transactionTypes=INTERNAL_PAYMENT&transactionTypes=SETTLEMENT`
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/MerchantTransactionTypeEnum'
          example:
            - INTERNAL_PAYMENT
            - SETTLEMENT
      responses:
        '200':
          description: لیست تراکنش‌ها با موفقیت دریافت شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantTransactionsListResponse'
              examples:
                defaultResponse:
                  summary: نمونه پاسخ
                  value:
                    status: OK
                    result:
                      page: 0
                      perPage: 10
                      totalItems: 2
                      totalPages: 1
                      data:
                        - id: 170776
                          type: INTERNAL_PAYMENT
                          amount:
                            amount:
                              number: "250.00"
                              unit: "USDT"
                            usdValue:
                              number: "250.00"
                              unit: "USD"
                            irtValue:
                              number: "15750000"
                              unit: "IRT"
                          fee:
                            number: "2.50"
                            unit: "USDT"
                          feeValue:
                            number: "2.50"
                            unit: "USD"
                          timestamp: "2026-03-16T09:45:12Z"
                          supportCode: "TX-9F3K2M1"
                          internalPaymentTransactionDto:
                            applicationInvoice:
                              type: INTERNAL_CRYPTO
                              amount:
                                number: "250.00"
                                unit: "USDT"
                              supportCode: "AI-8LEYRQH-G8HM"
                              orderId: "ORDER-1001"
                              description: "خرید اشتراک ویژه"
                              createdAt: "2026-03-16T09:40:00Z"
