  /v1/merchants/invoices/temporary-wallet:
    post:
      tags:
        - فاکتور
      summary: ایجاد فاکتور
      description: |
        یک آدرس کیف پول موقت اختصاصی برای دریافت پرداخت کریپتو ایجاد می‌کند.

        ---

        ## توکن و شبکه

        می‌توانید فاکتور را برای دریافت **USDT، TRX، TON** و سایر توکن‌های پشتیبانی‌شده ایجاد کنید.
        شبکه‌های در دسترس شامل **BSC، TRON، TON** و غیره هستند.

        مبلغ درخواستی (`amount`) می‌تواند به هر واحدی باشد — مثلاً `USD`، `IRT` یا مستقیماً به توکن مورد نظر.
        سواپ‌ولت مبلغ معادل را به‌صورت خودکار محاسبه کرده و در پاسخ (`amount.amount`) برمی‌گرداند.

        > [!note]
        > مبلغی که در `amount.amount` پاسخ دریافت می‌کنید را **دقیقاً** به کاربر نمایش دهید. کاربر باید همین مقدار را به آدرس `walletAddress` واریز کند.

        ---

        ## مدیریت فاکتور

        **`orderId`** — شناسه‌ی فاکتور در سیستم شما. ارسال این فیلد باعث می‌شود فاکتورهای تکراری ایجاد نشوند و بتوانید بعداً با همین شناسه فاکتور را جستجو کنید.

        **`ttl`** — مدت اعتبار فاکتور به ثانیه. پیشنهاد می‌شود مقدار `86400` (۲۴ ساعت) استفاده کنید.

        **`webhookUrl`** — پس از پرداخت موفق، یک درخواست `POST` به این آدرس ارسال می‌شود. برای پیگیری وضعیت پرداخت به‌صورت real-time استفاده کنید.

        **`underPaidCoveragePercent`** — اگر کاربر مبلغی کمتر از مقدار درخواستی واریز کند، فاکتور همچنان تأیید می‌شود. این گزینه برای مواردی مفید است که صرافی‌ها کارمزد را از مبلغ ورودی کاربر کسر می‌کنند.

        ---

        ## اطلاعات کاربر

        > [!note]
        > **توصیه اکید:** فیلدهای `userId`، `userEmail`، `userPhoneNumber` و `userTelegramId` را ارسال کنید. این اطلاعات برای ردیابی تراکنش‌ها، رفع مشکلات احتمالی و پشتیبانی از کاربران بسیار کمک‌کننده است.

        ---

        ## پاسخ و نمایش به کاربر

        پس از ایجاد موفق فاکتور:

        - **`id`** — شناسه‌ی یکتای فاکتور در سواپ‌ولت. برای بررسی وضعیت فاکتور از این شناسه استفاده کنید.
        - **`walletAddress`** — آدرس کیف پول موقت که باید به کاربر نمایش دهید.
        - **`amount.amount`** — مبلغ دقیقی که کاربر باید واریز کند. این مقدار را عیناً به کاربر نشان دهید.

        > [!note]
        > اگر کاربر مبلغ را به چند قسمت واریز کند، سواپ‌ولت مجموع واریزی‌ها را محاسبه می‌کند. فاکتور تا زمانی که مجموع پرداخت‌ها به حد نصاب نرسد یا منقضی نشود، باز می‌ماند.
      operationId: createApplicationInvoiceWithTemporaryWallet
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationInvoiceWithTemporaryWalletRequest'
            examples:
              default:
                summary: نمونه درخواست ایجاد فاکتور با کیف پول موقت
                value:
                  amount:
                    number: "1000000"
                    unit: "IRT"
                  allowedToken: USDT
                  network: BSC
                  webhookUrl: "https://example.com/webhook"
                  returnUrl: "https://example.com/return"
                  ttl: 86400
                  underPaidCoveragePercent: 0
                  orderId: "your-internal-unique-invoice-id"
                  customData: "any text / {\"campaign\":\"spring-sale\"}"
                  description: "پرداخت با کیف پول موقت"
                  userId: "your-internal-id-for-user"
                  userEmail: "wallet@example.com"
                  userPhoneNumber: "+989123334455 or 09123334455"
                  userLanguage: FA
                  userTelegramId: 974181500
      responses:
        '200':
          description: فاکتور با کیف پول موقت با موفقیت ایجاد شد
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApplicationInvoiceWithTemporaryWalletResponseWrapper'
