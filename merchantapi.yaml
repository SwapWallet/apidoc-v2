                    unit: "USDT"
                  supportCode: "AI-8LEYRQH-G8HM"
                  orderId: "ORDER-1001"
                  description: "خرید اشتراک ویژه"
                  createdAt: "2026-03-16T09:40:00Z"
                  status: PAID
                  extraStatus: null
                amount:
                  amount:
                    number: "250.00"
                    unit: "USDT"
                  usdValue:
                    number: "250.00"
                    unit: "USD"
                  irtValue:
                    number: "15750000"
                    unit: "IRT"
